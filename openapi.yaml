openapi: 3.0.3
info:
  title: Schelling Protocol REST API
  version: 3.0.0
  description: |
    OpenAPI specification for the Schelling Protocol REST API.
    All operations are POST requests to `/schelling/{operation}` unless noted otherwise.
servers:
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Server health and info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /openapi.yaml:
    get:
      operationId: getOpenApiYaml
      summary: OpenAPI specification
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string

  /schelling/server_info:
    post:
      operationId: serverInfo
      summary: Server information
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyInput"
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfoOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/describe:
    post:
      operationId: describe
      summary: Protocol description
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyInput"
      responses:
        "200":
          description: Protocol description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/onboard:
    post:
      operationId: onboard
      summary: Generate a registration template from natural language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardInput"
      responses:
        "200":
          description: Onboarding results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/register:
    post:
      operationId: register
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/update:
    post:
      operationId: update
      summary: Update an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInput"
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/refresh:
    post:
      operationId: refresh
      summary: Refresh a user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
