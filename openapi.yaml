                $ref: "#/components/schemas/ToolFeedbackOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/my_insights:
    post:
      operationId: myInsights
      summary: Get personalized insights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyInsightsInput"
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyInsightsOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/analytics:
    post:
      operationId: analytics
      summary: Admin analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyticsInput"
      responses:
        "200":
          description: Analytics result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/export:
    post:
      operationId: export
      summary: Export user data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportInput"
      responses:
        "200":
          description: Export result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /schelling/delete_account:
    post:
      operationId: deleteAccount
      summary: Delete user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountInput"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountOutput"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Bearer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    EmptyInput:
      type: object
      additionalProperties: false

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    Visibility:
      type: string
      enum: [public, after_interest, after_commit, after_connect, private]

    VerificationTier:
      type: string
      enum: [unverified, self_verified, cross_verified, authority_verified]

    PreferenceOperator:
      type: string
      enum: [eq, neq, gt, gte, lt, lte, in, contains, exists, range, contains_any, regex, contains_all]

    FunnelMode:
      type: string
      enum: [bilateral, broadcast, group, auction]

    Trait:
      type: object
      required: [key, value, value_type, visibility]
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items: { type: string }
        value_type:
          type: string
          enum: [string, number, boolean, enum, array]
        visibility:
          $ref: "#/components/schemas/Visibility"
        verification:
          $ref: "#/components/schemas/VerificationTier"
        display_name:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        enum_values:
          type: array
          items: { type: string }
          nullable: true

    Preference:
      type: object
      required: [trait_key, operator, value, weight]
      properties:
        trait_key:
          type: string
        operator:
          $ref: "#/components/schemas/PreferenceOperator"
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items: { type: string }
            - type: array
              items: { type: number }
        weight:
          type: number
        label:
          type: string
          nullable: true

    Capability:
      type: object
      required: [capability]
      properties:
        capability:
          type: string
        parameters:
          type: object
          additionalProperties: true
          nullable: true
        confidence:
          type: number
          nullable: true

    AgentAttestation:
      type: object
      required: [model, method, interaction_hours, generated_at]
      properties:
        model: { type: string }
        method: { type: string }
        interaction_hours: { type: number }
        generated_at: { type: string, format: date-time }

    TextProfile:
      type: object
      properties:
        description: { type: string }
        seeking: { type: string }
        interests:
          type: array
          items: { type: string }
        values_text: { type: string }

    Identity:
      type: object
      properties:
        name: { type: string }
        contact: { type: string }
        phone_hash: { type: string }

    NLParseResult:
      type: object
      required: [cluster_id, traits, keywords]
      properties:
        cluster_id:
          type: string
          nullable: true
        traits:
          type: array
          items: { $ref: "#/components/schemas/Trait" }
        keywords:
          type: array
          items: { type: string }

    VisibleTrait:
      type: object
      required: [key, value, value_type, verification]
      properties:
        key: { type: string }
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items: { type: string }
        value_type: { type: string }
        display_name:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        verification: { type: string }

    VisibleTraitWithVisibility:
      allOf:
        - $ref: "#/components/schemas/VisibleTrait"
        - type: object
          required: [visibility]
          properties:
            visibility: { type: string }

    PreferenceSatisfactionDetail:
      type: object
      required: [satisfied, score, candidate_value, missing]
      properties:
        satisfied: { type: boolean }
        score: { type: number }
        candidate_value: { }
        missing: { type: boolean }

    VerificationSummary:
      type: object
      required: [total_traits, unverified, self_verified, cross_verified, authority_verified, overall_trust]
      properties:
        total_traits: { type: number }
        unverified: { type: number }
        self_verified: { type: number }
        cross_verified: { type: number }
        authority_verified: { type: number }
        overall_trust: { type: number }

    RankingExplanation:
      type: object
      required: [model_tier, adjustments, outcome_basis]
      properties:
        model_tier:
          type: string
          enum: [prior]
        adjustments:
          type: array
          items: {}
        outcome_basis:
          type: integer
          enum: [0]

    SearchPendingAction:
      type: object
      required: [candidate_id, action_type]
      properties:
        candidate_id: { type: string }
        action_type: { type: string }

    SearchResult:
      type: object
      required:
        - candidate_id
        - advisory_score
        - your_fit
        - their_fit
        - intent_similarity
        - preference_satisfaction
        - visible_traits
        - intents
        - agent_capabilities
        - reputation_score
        - verification_summary
        - funnel_mode
        - group_size
        - group_filled
        - stale
        - computed_at
      properties:
        candidate_id: { type: string }
        advisory_score: { type: number }
        your_fit: { type: number }
        their_fit: { type: number }
        intent_similarity: { type: number, nullable: true }
        preference_satisfaction:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PreferenceSatisfactionDetail"
        visible_traits:
          type: array
          items: { $ref: "#/components/schemas/Trait" }
        intents:
          type: array
          items: { type: string }
        agent_capabilities:
          type: array
          items: { $ref: "#/components/schemas/Capability" }
        reputation_score: { type: number }
        verification_summary:
          $ref: "#/components/schemas/VerificationSummary"
        funnel_mode: { type: string }
        group_size: { type: number, nullable: true }
        group_filled: { type: number, nullable: true }
        stale: { type: boolean }
        computed_at: { type: string, format: date-time }

    SearchOutput:
      type: object
      required: [candidates, total_scanned, total_matches, ranking_explanation, next_cursor, pending_actions, nl_parsed]
      properties:
        candidates:
          type: array
          items: { $ref: "#/components/schemas/SearchResult" }
        total_scanned: { type: number }
        total_matches: { type: number }
        ranking_explanation:
          $ref: "#/components/schemas/RankingExplanation"
        next_cursor:
          type: string
          nullable: true
        pending_actions:
          type: array
          items: { $ref: "#/components/schemas/SearchPendingAction" }
        nl_parsed:
          type: object
          additionalProperties: true
          nullable: true

    SearchInput:
      type: object
      required: [user_token]
      properties:
        user_token: { type: string }
        cluster_id: { type: string }
        top_k: { type: number }
        threshold: { type: number }

    RegisterInput:
      type: object
      required: [protocol_version, cluster_id]
      properties:
        protocol_version: { type: string }
        cluster_id: { type: string }
        role: { type: string }
        funnel_mode: { $ref: "#/components/schemas/FunnelMode" }
        group_size: { type: number }
        auto_fill: { type: boolean }
        group_deadline: { type: string, format: date-time }
        traits:
          type: array
          items: { $ref: "#/components/schemas/Trait" }
        natural_language: { type: string }
        preferences:
          type: array
          items: { $ref: "#/components/schemas/Preference" }
        intent_embedding:
          type: array
          items: { type: number }
        intents:
          type: array
          items: { type: string }
        personality_embedding:
          type: array
          items: { type: number }
        appearance_embedding:
          type: array
          items: { type: number }
        text_profile: { $ref: "#/components/schemas/TextProfile" }
        identity: { $ref: "#/components/schemas/Identity" }
        agent_model: { type: string }
        agent_capabilities:
          type: array
          items: {}
        agent_attestation: { $ref: "#/components/schemas/AgentAttestation" }
        media_refs:
          type: array
          items: { type: string }
        auto_interest_opt_out: { type: boolean }
        behavioral_inference_opt_out: { type: boolean }
        user_token: { type: string }
        idempotency_key: { type: string }

    RegisterOutput:
      type: object
      required:
        - user_token
        - protocol_version
        - cluster_id
        - cluster_created
        - trait_count
        - preference_count
        - profile_completeness
        - suggested_additions
        - nl_parsed
      properties:
        user_token: { type: string }
        protocol_version: { type: string, enum: ["3.0"] }
        cluster_id: { type: string }
        cluster_created: { type: boolean }
        trait_count: { type: number }
        preference_count: { type: number }
        profile_completeness: { type: number }
        suggested_additions:
          type: array
          items: { type: string }
        nl_parsed:
          type: object
          additionalProperties: true
          nullable: true

    UpdateInput:
      type: object
      required: [user_token]
      properties:
        user_token: { type: string }
        traits:
          type: array
          items: { $ref: "#/components/schemas/Trait" }
        remove_traits:
          type: array
          items: { type: string }
        preferences:
          type: array
          items: { $ref: "#/components/schemas/Preference" }
        remove_preferences:
          type: array
          items: { type: string }
        text_profile: { $ref: "#/components/schemas/TextProfile" }
        intent_embedding:
          type: array
          items: { type: number }
        intents:
          type: array
          items: { type: string }
        personality_embedding:
          type: array
          items: { type: number }
        appearance_embedding:
          type: array
          items: { type: number }
        status:
          type: string
          enum: [active, paused, delisted]
        funnel_mode: { $ref: "#/components/schemas/FunnelMode" }
        identity: { $ref: "#/components/schemas/Identity" }
        agent_model: { type: string }
        agent_capabilities:
          type: array
          items: {}
        agent_attestation: { $ref: "#/components/schemas/AgentAttestation" }
        media_refs:
          type: array
          items: { type: string }
        auto_interest_opt_out: { type: boolean }
        behavioral_inference_opt_out: { type: boolean }
        group_size: { type: number }
        auto_fill: { type: boolean }
        group_deadline: { type: string, format: date-time }

    UpdateOutput:
      type: object
      required: [updated, trait_count, preference_count, profile_completeness, nl_parsed]
      properties:
        updated: { type: boolean, enum: [true] }
        trait_count: { type: number }
        preference_count: { type: number }
        profile_completeness: { type: number }
        nl_parsed:
          type: object
          additionalProperties: true
          nullable: true

    RefreshInput:
      type: object
      required: [user_token]
      properties:
        user_token: { type: string }
        idempotency_key: { type: string }

    RefreshOutput:
      type: object
      required: [refreshed, refreshed_at, next_refresh_due]
      properties:
        refreshed: { type: boolean, enum: [true] }
        refreshed_at: { type: string, format: date-time }
        next_refresh_due: { type: string, format: date-time }

    OnboardInput:
      type: object
      required: [natural_language]
      properties:
        natural_language: { type: string }
        cluster_hint: { type: string }
        role_hint: { type: string }

    OnboardOutput:
      type: object
      required:
        - suggested_cluster
        - suggested_role
        - parsed_traits
        - parsed_preferences
        - additional_traits_suggested
        - registration_template
        - clarification_needed
        - cluster_priors
      properties:
        suggested_cluster:
          type: object
          required: [cluster_id, display_name, confidence, alternatives]
          properties:
            cluster_id: { type: string }
            display_name: { type: string, nullable: true }
            confidence: { type: number }
            alternatives:
              type: array
              items:
                type: object
                required: [cluster_id, display_name, confidence]
                properties:
                  cluster_id: { type: string }
                  display_name: { type: string, nullable: true }
                  confidence: { type: number }
        suggested_role:
          type: object
          nullable: true
          required: [role_id, confidence]
          properties:
            role_id: { type: string }
            confidence: { type: number }
        parsed_traits:
          type: array
          items:
            type: object
            required: [key, value, value_type, visibility, source]
            properties:
              key: { type: string }
              value:
                oneOf:
                  - type: string
                  - type: number
              value_type:
                type: string
                enum: [string, number]
              visibility:
                type: string
                enum: [public]
              source:
                type: string
                enum: [nl_extracted]
        parsed_preferences:
          type: array
          items: {}
        additional_traits_suggested:
          type: array
          items:
            type: object
            required: [trait_key, display_name, prompt, frequency]
            properties:
              trait_key: { type: string }
              display_name: { type: string, nullable: true }
              prompt: { type: string, nullable: true }
              frequency: { type: number }
        registration_template:
          type: object
          required: [protocol_version, cluster_id, role, traits, preferences, intents]
          properties:
            protocol_version: { type: string }
            cluster_id: { type: string }
            role: { type: string, nullable: true }
            traits:
              type: array
              items:
                type: object
                required: [key, value, value_type, visibility]
                properties:
                  key: { type: string }
                  value:
                    oneOf:
                      - type: string
                      - type: number
                  value_type:
                    type: string
                    enum: [string, number]
                  visibility:
                    type: string
                    enum: [public]
            preferences:
              type: array
              items: {}
            intents:
              type: array
              items: { type: string }
        clarification_needed:
          type: object
          additionalProperties: true
          nullable: true
        cluster_priors:
          type: object
          additionalProperties: true

    ClustersInput:
      type: object
      properties:
        action:
          type: string
          enum: [list, search, describe]
        query: { type: string }
        prefix: { type: string }
        min_population: { type: number }
        sort: { type: string }
        limit: { type: number }
        cursor: { type: string }

    ClustersOutput:
      type: object
      required: [action, clusters, total, next_cursor]
      properties:
        action: { type: string }
        clusters:
          type: array
          items:
            type: object
            required: [cluster_id, display_name, description, population, phase, default_funnel_mode, symmetric, age_restricted, last_activity]
            properties:
              cluster_id: { type: string }
              display_name: { type: string, nullable: true }
              description: { type: string, nullable: true }
              population: { type: number }
              phase: { type: string }
              default_funnel_mode: { type: string }
              symmetric: { type: boolean }
              age_restricted: { type: boolean }
              last_activity: { type: string, format: date-time }
        total: { type: number }
        next_cursor: { type: string, nullable: true }

    ClusterInfoInput:
      type: object
      required: [cluster_id]
      properties:
        cluster_id: { type: string }

    ClusterInfoOutput:
      type: object
      required:
        - cluster_id
        - display_name
        - description
        - population
        - phase
        - settings
        - suggested_traits
        - metadata
        - created_at
        - last_activity
      properties:
        cluster_id: { type: string }
        display_name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        population: { type: number }
        phase: { type: string }
        settings:
          type: object
          required: [symmetric, exclusive_commitment, age_restricted, default_funnel_mode, max_negotiation_rounds, proposal_timeout_hours]
          properties:
            symmetric: { type: boolean }
            exclusive_commitment: { type: boolean }
            age_restricted: { type: boolean }
            default_funnel_mode: { type: string }
            max_negotiation_rounds: { type: number }
            proposal_timeout_hours: { type: number }
        suggested_traits:
          type: array
          items:
            type: object
            required: [trait_key, value_type, display_name, frequency, signal_strength, prompt, enum_values]
            properties:
              trait_key: { type: string }
              value_type: { type: string, nullable: true }
              display_name: { type: string, nullable: true }
              frequency: { type: number }
              signal_strength: { type: number }
              prompt: { type: string, nullable: true }
              enum_values:
                type: array
                items: { type: string }
                nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at: { type: string, format: date-time }
        last_activity: { type: string, format: date-time }

    InterestInput:
      type: object
      required: [user_token, candidate_id]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        contract_proposal:
          type: object
          additionalProperties: true
          nullable: true
        idempotency_key: { type: string }

    InterestOutput:
      type: object
      required: [candidate_id, your_stage, their_stage, mutual_interest, newly_visible_traits, contract_id, interest_expires_at]
      properties:
        candidate_id: { type: string }
        your_stage: { type: number }
        their_stage: { type: number }
        mutual_interest: { type: boolean }
        newly_visible_traits:
          type: array
          items: { $ref: "#/components/schemas/VisibleTrait" }
        contract_id:
          type: string
          nullable: true
        interest_expires_at:
          type: string
          format: date-time
          nullable: true

    CommitInput:
      type: object
      required: [user_token, candidate_id]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        idempotency_key: { type: string }

    CommitOutput:
      type: object
      required: [candidate_id, your_stage, their_stage, connected, newly_visible_traits]
      properties:
        candidate_id: { type: string }
        your_stage: { type: number }
        their_stage: { type: number }
        connected: { type: boolean }
        newly_visible_traits:
          type: array
          items: { $ref: "#/components/schemas/VisibleTrait" }

    ConnectionsInput:
      type: object
      required: [user_token]
      properties:
        user_token: { type: string }
        stage_filter: { type: number }
        cluster_filter: { type: string }
        mode_filter: { type: string }
        limit: { type: number }
        cursor: { type: string }

    CandidateSummary:
      type: object
      required:
        - id
        - other_token_hash
        - cluster_id
        - funnel_mode
        - score
        - fit_for_you
        - fit_for_them
        - intent_similarity
        - your_stage
        - their_stage
        - created_at
        - updated_at
        - visible_traits
      properties:
        id: { type: string }
        other_token_hash: { type: string }
        cluster_id: { type: string }
        funnel_mode: { type: string }
        score: { type: number }
        fit_for_you: { type: number }
        fit_for_them: { type: number }
        intent_similarity: { type: number, nullable: true }
        your_stage: { type: number }
        their_stage: { type: number }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        visible_traits:
          type: array
          items: { $ref: "#/components/schemas/VisibleTraitWithVisibility" }

    ConnectionsOutput:
      type: object
      required: [candidates, total, next_cursor]
      properties:
        candidates:
          type: array
          items: { $ref: "#/components/schemas/CandidateSummary" }
        total: { type: number }
        next_cursor: { type: string, nullable: true }

    DeclineInput:
      type: object
      required: [user_token, candidate_id]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        reason:
          type: string
          enum: [not_interested, dealbreaker, timing, logistics, other]
        feedback:
          type: object
          additionalProperties: true
        idempotency_key: { type: string }

    DeclineOutput:
      type: object
      required: [declined, decline_count, permanent, expires_at]
      properties:
        declined: { type: boolean, enum: [true] }
        decline_count: { type: number }
        permanent: { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }

    ReconsiderInput:
      type: object
      required: [user_token, candidate_id]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        idempotency_key: { type: string }

    ReconsiderOutput:
      type: object
      required: [candidate_id, stage, reconsidered_at]
      properties:
        candidate_id: { type: string }
        stage: { type: string, enum: [DISCOVERED] }
        reconsidered_at: { type: string, format: date-time }

    WithdrawInput:
      type: object
      required: [user_token, candidate_id]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        reason: { type: string }
        idempotency_key: { type: string }

    WithdrawOutput:
      type: object
      required: [withdrawn, your_stage]
      properties:
        withdrawn: { type: boolean, enum: [true] }
        your_stage: { type: number }

    ReportInput:
      type: object
      required: [user_token, candidate_id, outcome]
      properties:
        user_token: { type: string }
        candidate_id: { type: string }
        outcome:
          type: string
          enum: [positive, neutral, negative]
        feedback:
          type: object
          additionalProperties: true
        idempotency_key: { type: string }

