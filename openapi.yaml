          required: [profiles, candidates, messages, inquiries, subscriptions, contracts, deliverables, events]
          properties:
            profiles: { type: number }
            candidates: { type: number }
            messages: { type: number }
            inquiries: { type: number }
            subscriptions: { type: number }
            contracts: { type: number }
            deliverables: { type: number }
            events: { type: number }

    QuickSeekInput:
      type: object
      required: [intent]
      properties:
        user_token: { type: string }
        intent: { type: string }
        cluster_id: { type: string }
        constraints:
          type: object
          additionalProperties: true
        max_results: { type: number }
        auto_advance: { type: boolean }
        deadline: { type: string, format: date-time }
        budget: { type: number }

    QuickSeekSearchResult:
      type: object
      required: [user_token_hash, score, matching_traits]
      properties:
        user_token_hash: { type: string }
        score: { type: number }
        matching_traits:
          type: array
          items: { type: string }
        candidate_id: { type: string }

    QuickSeekOutput:
      type: object
      required: [user_token, cluster_id, candidates, total_matches, auto_advanced, nl_parsed, registration_created]
      properties:
        user_token: { type: string }
        cluster_id: { type: string }
        candidates:
          type: array
          items: { $ref: "#/components/schemas/QuickSeekSearchResult" }
        total_matches: { type: number }
        auto_advanced:
          type: array
          items: { type: string }
        nl_parsed: { $ref: "#/components/schemas/NLParseResult" }
        registration_created: { type: boolean }

    QuickOfferInput:
      type: object
      required: [intent]
      properties:
        user_token: { type: string }
        intent: { type: string }
        cluster_id: { type: string }
        traits:
          type: array
          items: { $ref: "#/components/schemas/Trait" }
        available_until: { type: string, format: date-time }
        auto_subscribe: { type: boolean }
        notification_threshold: { type: number }

    QuickOfferOutput:
      type: object
      required: [user_token, cluster_id, profile_completeness, subscription_id, existing_matches, nl_parsed, registration_created]
      properties:
        user_token: { type: string }
        cluster_id: { type: string }
        profile_completeness: { type: number }
        subscription_id: { type: string, nullable: true }
        existing_matches: { type: number }
        nl_parsed: { $ref: "#/components/schemas/NLParseResult" }
        registration_created: { type: boolean }

    QuickMatchInput:
      type: object
      required: [seek, offer]
      properties:
        seek:
          type: object
          required: [intent]
          properties:
            intent: { type: string }
            traits:
              type: array
              items: { $ref: "#/components/schemas/Trait" }
            preferences:
              type: array
              items: { $ref: "#/components/schemas/Preference" }
            cluster_id: { type: string }
        offer:
          type: object
          required: [intent]
          properties:
            intent: { type: string }
            traits:
              type: array
              items: { $ref: "#/components/schemas/Trait" }
            cluster_id: { type: string }
        auto_connect: { type: boolean }

    QuickMatchOutput:
      type: object
      required: [matched, seek_token, offer_token, cluster_id, advisory_score, candidate_id, connected, seek_parsed, offer_parsed]
      properties:
        matched: { type: boolean }
        seek_token: { type: string }
        offer_token: { type: string }
        cluster_id: { type: string }
        advisory_score: { type: number }
        candidate_id: { type: string }
        connected: { type: boolean }
        seek_parsed: { $ref: "#/components/schemas/NLParseResult" }
        offer_parsed: { $ref: "#/components/schemas/NLParseResult" }

    ServerInfoOutput:
      type: object
      required:
        - protocol_version
        - server_name
        - server_version
        - cluster_count
        - total_tools
        - default_tools
        - federation_enabled
        - capabilities
        - rate_limits
        - mcp_manifest_url
        - openapi_url
      properties:
        protocol_version: { type: string }
        server_name: { type: string }
        server_version: { type: string }
        cluster_count: { type: number }
        total_tools: { type: number }
        default_tools:
          type: array
          items:
            type: object
            required: [tool_id, display_name, one_line_description]
            properties:
              tool_id: { type: string }
              display_name: { type: string }
              one_line_description: { type: string }
        federation_enabled: { type: boolean }
        capabilities:
          type: object
          required: [natural_language, funnel_modes, fast_paths, deliverables, disputes, reputation, verification, data_export]
          properties:
            natural_language: { type: boolean }
            funnel_modes:
              type: array
              items: { type: string }
            fast_paths: { type: boolean }
            deliverables: { type: boolean }
            disputes: { type: boolean }
            reputation: { type: boolean }
            verification: { type: boolean }
            data_export: { type: boolean }
        rate_limits:
          type: object
          required: [register_per_day, search_per_hour, propose_per_hour, onboard_per_hour, describe_per_hour, clusters_per_hour]
          properties:
            register_per_day: { type: number }
            search_per_hour: { type: number }
            propose_per_hour: { type: number }
            onboard_per_hour: { type: number }
            describe_per_hour: { type: number }
            clusters_per_hour: { type: number }
        mcp_manifest_url:
          type: string
          nullable: true
        openapi_url:
          type: string
          nullable: true

    DescribeOutput:
      type: object
      required: [protocol, getting_started, clusters, tools, capabilities, server, mcp_manifest_url, openapi_url]
      properties:
        protocol:
          type: object
          required: [name, version, purpose, how_it_works, key_concepts]
          properties:
            name: { type: string }
            version: { type: string }
            purpose: { type: string }
            how_it_works: { type: string }
            key_concepts:
              type: object
              required: [trait, preference, cluster, funnel, funnel_modes]
              properties:
                trait: { type: string }
                preference: { type: string }
                cluster: { type: string }
                funnel: { type: string }
                funnel_modes: { type: string }
        getting_started:
          type: object
          required: [steps, zero_config]
          properties:
            steps:
              type: array
              items: { type: string }
            zero_config: { type: string }
        clusters:
          type: object
          required: [total_active, top_clusters, browse_operation]
          properties:
            total_active: { type: number }
            top_clusters:
              type: array
              items:
                type: object
                required: [cluster_id, display_name, population, phase]
                properties:
                  cluster_id: { type: string }
                  display_name: { type: string, nullable: true }
                  population: { type: number }
                  phase: { type: string }
            browse_operation: { type: string }
        tools:
          type: object
          required: [total_available, default_tools, browse_operation]
          properties:
            total_available: { type: number }
            default_tools:
              type: array
              items:
                type: object
                required: [tool_id, display_name, one_line_description]
                properties:
                  tool_id: { type: string }
                  display_name: { type: string }
                  one_line_description: { type: string }
            browse_operation: { type: string }
        capabilities:
          type: object
          required: [natural_language, funnel_modes, federation, fast_paths, deliverables]
          properties:
            natural_language: { type: boolean }
            funnel_modes:
              type: array
              items: { type: string }
            federation: { type: boolean }
            fast_paths: { type: boolean }
            deliverables: { type: boolean }
        server:
          type: object
          required: [name, version, operator]
          properties:
            name: { type: string }
            version: { type: string }
            operator:
              type: string
              nullable: true
        mcp_manifest_url:
          type: string
          nullable: true
        openapi_url:
          type: string
          nullable: true

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/ServerInfoOutput"
        - type: object
          required: [status]
          properties:
            status: { type: string, enum: [healthy] }
