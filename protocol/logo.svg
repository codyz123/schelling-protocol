<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 64" width="400" height="64">
  <!-- Schelling point mark -->
  <g transform="translate(0, 0)">
    <line x1="8" y1="8" x2="28" y2="28" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="8" x2="36" y2="28" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="56" x2="28" y2="36" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="56" x2="36" y2="36" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="4.5" fill="#14B8A6"/>
    <circle cx="56" cy="8" r="4.5" fill="#14B8A6"/>
    <circle cx="8" cy="56" r="4.5" fill="#14B8A6"/>
    <circle cx="56" cy="56" r="4.5" fill="#14B8A6"/>
    <circle cx="32" cy="32" r="7" fill="#0F766E"/>
    <circle cx="32" cy="32" r="3" fill="#14B8A6"/>
  </g>
  <!-- Divider -->
  <line x1="76" y1="12" x2="76" y2="52" stroke="#0F766E" stroke-width="1" opacity="0.3"/>
  <!-- SCHELLING -->
  <text x="92" y="33"
        font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace"
        font-size="22"
        font-weight="600"
        letter-spacing="3.5"
        fill="#0F766E">SCHELLING</text>
  <!-- PROTOCOL -->
  <text x="92" y="51"
        font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace"
        font-size="11"
        font-weight="400"
        letter-spacing="6.5"
        fill="#14B8A6">PROTOCOL</text>
</svg>
