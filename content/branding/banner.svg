<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440">
  <defs>
    <radialGradient id="bgr" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0D3D38"/>
      <stop offset="100%" stop-color="#041A17"/>
    </radialGradient>
  </defs>
  <rect width="2560" height="1440" fill="url(#bgr)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#14B8A6" stroke-width="0.5">
