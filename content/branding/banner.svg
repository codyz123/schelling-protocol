    <circle cx="120" cy="820" r="6" fill="#14B8A6"/>
    <circle cx="400" cy="820" r="6" fill="#14B8A6"/>
    <circle cx="255" cy="685" r="10" fill="#0F766E"/>
    <circle cx="255" cy="685" r="4" fill="#14B8A6"/>
  </g>
  <!-- Decorative convergence nodes (right cluster) -->
  <g opacity="0.2">
    <line x1="2160" y1="560" x2="2270" y2="670" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="2440" y1="560" x2="2320" y2="670" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="2160" y1="820" x2="2270" y2="700" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <line x1="2440" y1="820" x2="2320" y2="700" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="2160" cy="560" r="6" fill="#14B8A6"/>
    <circle cx="2440" cy="560" r="6" fill="#14B8A6"/>
    <circle cx="2160" cy="820" r="6" fill="#14B8A6"/>
    <circle cx="2440" cy="820" r="6" fill="#14B8A6"/>
    <circle cx="2305" cy="685" r="10" fill="#0F766E"/>
    <circle cx="2305" cy="685" r="4" fill="#14B8A6"/>
  </g>
  <!-- Center logo mark - everything within safe zone (x:507-2053, y:509-931) -->
  <!-- Logo centered at 1280,660 - compact version -->
  <g transform="translate(1280, 650)">
    <line x1="-65" y1="-65" x2="-14" y2="-14" stroke="#0F766E" stroke-width="7" stroke-linecap="round"/>
    <line x1="65" y1="-65" x2="14" y2="-14" stroke="#0F766E" stroke-width="7" stroke-linecap="round"/>
    <line x1="-65" y1="65" x2="-14" y2="14" stroke="#0F766E" stroke-width="7" stroke-linecap="round"/>
    <line x1="65" y1="65" x2="14" y2="14" stroke="#0F766E" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-65" cy="-65" r="10" fill="#14B8A6"/>
    <circle cx="65" cy="-65" r="10" fill="#14B8A6"/>
    <circle cx="-65" cy="65" r="10" fill="#14B8A6"/>
    <circle cx="65" cy="65" r="10" fill="#14B8A6"/>
    <circle cx="0" cy="0" r="20" fill="#14B8A6" opacity="0.15"/>
    <circle cx="0" cy="0" r="15" fill="#0F766E"/>
    <circle cx="0" cy="0" r="7" fill="#14B8A6"/>
