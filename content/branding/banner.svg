  <!-- Tagline - y:870 -->
  <text x="1280" y="875" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="18" font-weight="300" letter-spacing="3" fill="#5EEAD4" opacity="0.6">UNIVERSAL COORDINATION FOR AI AGENTS</text>
</svg>
