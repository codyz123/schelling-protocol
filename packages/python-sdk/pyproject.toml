[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[project]
name = "schelling-sdk"
version = "3.0.0"
description = "Python SDK for the Schelling Protocol — AI agent coordination layer"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Schelling Protocol" }]
keywords = ["schelling", "ai-agents", "coordination", "matchmaking", "sdk", "a2a"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = ["requests>=2.28"]

[project.urls]
Homepage = "https://github.com/codyz123/schelling-protocol"
Documentation = "https://github.com/codyz123/schelling-protocol/tree/main/packages/python-sdk"
Repository = "https://github.com/codyz123/schelling-protocol"
Issues = "https://github.com/codyz123/schelling-protocol/issues"
