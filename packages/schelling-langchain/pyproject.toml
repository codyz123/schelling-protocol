[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "schelling-langchain"
version = "0.1.0"
description = "LangChain tools for the Schelling Protocol — multi-agent coordination network"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Schelling Protocol", email = "hello@schellingprotocol.com"}]
keywords = ["langchain", "langgraph", "agents", "coordination", "schelling"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "langchain-core>=0.3.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
openai = ["langchain-openai>=0.2.0"]

[project.urls]
Homepage = "https://schellingprotocol.com"
Repository = "https://github.com/codyz123/schelling-protocol"

[tool.setuptools.packages.find]
include = ["schelling_langchain*"]
